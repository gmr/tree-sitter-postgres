name: Publish
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  TREE_SITTER_ABI_VERSION: 15

jobs:
  # ── GitHub Release (inlined — reusable workflow lacks lfs: true) ─────────────

  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Set up tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2
      - name: Install dependencies
        run: |-
          if jq -e "$JQ_SCRIPT" package.json >/dev/null; then
            npm i --ignore-scripts --omit peer --omit optional
          fi
        env:
          JQ_SCRIPT: >-
            .dependencies + .devDependencies |
            with_entries(select(
            (.key | startswith("tree-sitter-"))
            and (.key != "tree-sitter-cli")
            )) | length > 0
      - name: Build Wasm binaries
        shell: bash
        run: |-
          while read -r grammar_dir; do
            tree-sitter build --wasm "$grammar_dir"
          done < <(jq -r '.grammars[].path // "."' tree-sitter.json)
      - name: Create source code tarball
        run: |
          git ls-files > "$RUNNER_TEMP/files"
          while read -r src_dir; do
            printf '%s\n' >> "$RUNNER_TEMP/files" \
              "$src_dir"/parser.c "$src_dir"/grammar.json \
              "$src_dir"/node-types.json "$src_dir"/tree_sitter/*
          done < <(jq -r "$JQ_SCRIPT" tree-sitter.json)
          tar cvzf "$REPO_NAME.tar.gz" -T <(sort -u "$RUNNER_TEMP/files")
        env:
          JQ_SCRIPT: >-
            .grammars[] |
            if (.path? // ".") == "."
            then "src"
            else "\(.path)/src"
            end
      - name: Generate attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            *.wasm
            ${{ env.REPO_NAME }}.tar.gz
      - name: Create GitHub release
        run: |-
          gh release create "$GITHUB_REF_NAME" *.wasm "$REPO_NAME.tar.gz" \
            -n "**NOTE:** Download \`$REPO_NAME.tar.gz\` for the *complete* source code."
        env:
          GH_TOKEN: ${{ github.token }}

  # ── crates.io (trusted publishing via OIDC) ──────────────────────────────────

  crates:
    name: Publish Rust package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: crates
      url: https://crates.io/crates/tree-sitter-postgres
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Get crates.io token via trusted publishing
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── PyPI (trusted publishing via OIDC) ────────────────────────────────────────

  build_sdist:
    name: Build source dist
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install --upgrade pip build setuptools wheel
      - name: Build sources
        run: python -mbuild -n -s
      - name: Upload sources
        uses: actions/upload-artifact@v7
        with:
          name: dist-sources
          path: dist/*.tar.gz
          retention-days: 2

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - windows-2025
          - windows-11-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        with:
          output-dir: dist
        env:
          CIBW_ARCHS: native
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.whl
          name: dist-wheels-${{ matrix.os }}
          retention-days: 2

  pypi:
    name: Publish Python package
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/tree-sitter-postgres/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: Check build artifacts
        run: ls -l dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── npm (trusted publishing via OIDC provenance) ──────────────────────────────

  build_wasm:
    name: Build Wasm binaries
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "22"
      - name: Install dependencies
        run: npm i --omit peer --omit optional
      - name: Build Wasm binaries
        run: |-
          while read -r grammar_dir; do
            npm x -- tree-sitter build --wasm "$grammar_dir"
          done < <(jq -r '.grammars[].path // "."' tree-sitter.json)
      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          path: "*.wasm"
          name: prebuilds-wasm
          retention-days: 2

  build_node:
    name: Build NodeJS binaries on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - windows-2025
          - windows-11-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "22"
      - name: Install dependencies
        run: npm i --omit peer --omit optional
      - name: Build binary
        run: npm x -- prebuildify -t 20.19.5
      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          path: prebuilds/**
          name: prebuilds-${{ matrix.os }}
          retention-days: 2

  npm:
    name: Publish NodeJS package
    needs: [build_wasm, build_node]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/tree-sitter-postgres
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "22"
          registry-url: https://registry.npmjs.org/
      - name: Install npm with trusted publishing support
        run: npm install -g npm@latest
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: prebuilds
          pattern: prebuilds-*
          merge-multiple: true
      - name: Check binaries
        run: tree prebuilds
      - name: Move Wasm binaries to root
        continue-on-error: true
        run: mv -v prebuilds/*.wasm .
      - name: Publish to npm
        run: npm publish
