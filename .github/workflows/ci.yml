name: CI
on:
  push:
    branches: [main]
    paths:
      - postgres/**
      - plpgsql/**
      - bindings/**
      - script/**
      - Cargo.toml
      - package.json
      - pyproject.toml
      - Package.swift
      - binding.gyp
      - go.mod
  pull_request:
    paths:
      - postgres/**
      - plpgsql/**
      - bindings/**
      - script/**
      - Cargo.toml
      - package.json
      - pyproject.toml
      - Package.swift
      - binding.gyp
      - go.mod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-and-test:
    # Generate the parser once on a fast runner, then run corpus tests.
    # The postgres grammar produces an ~90MB parser.c — too slow/large
    # for the standard parser-test-action which generates per-platform.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: tree-sitter/setup-action/cli@v2
      - name: Generate parser
        run: tree-sitter generate
      - name: Run corpus tests
        run: tree-sitter test
